<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ポートフォリオ提出管理</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📅</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;700;800;900&family=Poppins:wght@600;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:      #f0f0f0;
      --surface: #ffffff;
      --border:  #e2e2e2;
      --text:    #33332c;
      --muted:   #999999;
      --green:   #1D9E75;
      --red:     #E24B4A;
      --blue:    #2563eb;
      --hg:      #1D9E75;
      --hr:      #E24B4A;
      --radius:  16px;

      /* Rank palettes */
      --bronze-dark:    #993C1D; --bronze-light:    #F5C4B3;
      --silver-dark:    #444441; --silver-light:    #D3D1C7;
      --gold-dark:      #633806; --gold-light:      #FAC775; --gold-accent: #EF9F27;
      --platinum-dark:  #3C3489; --platinum-light:  #CECBF6;
      --legend-dark:    #72243E; --legend-light:    #F4C0D1;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg:      #0c0c0c;
        --surface: #1a1a1a;
        --border:  #2a2a2a;
        --text:    #ebebeb;
        --muted:   #888888;
        --green:   #4ade80;
        --red:     #f87171;
        --blue:    #60a5fa;
        --hg:      #15803d;
        --hr:      #991b1b;
      }
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Noto Sans JP', sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      padding: 36px 16px 96px;
    }
    .wrap { max-width: 760px; margin: 0 auto; }

    /* ── Header ── */
    .hd { margin-bottom: 20px; text-align: center; }
    .hd h1 { font-size: 27px; font-weight: 800; letter-spacing: -.02em; }
    .hd p  { font-size: 18px; color: var(--muted); margin-top: 6px; }

    /* ── Rules ── */
    .rules {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 24px;
      margin-bottom: 40px;
      display: flex; flex-direction: column; gap: 10px;
    }
    .rules p      { font-size: 13px; line-height: 1.8; color: var(--muted); }
    .rules strong { color: var(--text); font-weight: 700; }

    /* ── Section ── */
    .sec { margin-bottom: 36px; }
    .lbl {
      font-size: 10px; font-weight: 700;
      letter-spacing: .12em; text-transform: uppercase;
      color: var(--muted); margin-bottom: 10px;
    }

    /* ── Setup ── */
    .setup-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 48px 24px; text-align: center;
    }
    .setup-card p { font-size: 14px; color: var(--muted); margin-bottom: 20px; }

    /* ── Stats ── */
    .stats { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; }
    .stat {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 14px;
      transition: transform .2s cubic-bezier(.34,1.56,.64,1), border-color .2s;
    }
    .stat:hover { transform: translateY(-4px); border-color: var(--blue); }
    .stat-v { font-size: 28px; font-weight: 800; line-height: 1; }
    .stat-v.ok { color: var(--green); }
    .stat-v.ng { color: var(--red); }
    .stat-k { font-size: 11px; color: var(--muted); margin-top: 5px; }

    /* ── Rank Current ── */
    .rank-current {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      display: flex; align-items: center; gap: 20px;
    }
    .rank-current.has-rank { background: var(--rank-bg, var(--surface)); border-color: var(--rank-border, var(--border)); }
    .rank-current .ri {
      font-size: 56px; line-height: 1;
      width: 80px; height: 80px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 20px;
      background: var(--rank-icon-bg, color-mix(in srgb, var(--muted) 15%, transparent));
      flex-shrink: 0;
    }
    .rank-current .ri-info { flex: 1; min-width: 0; }
    .rank-current .ri-name {
      font-size: 22px; font-weight: 800; color: var(--rank-name, var(--text)); line-height: 1.1;
    }
    .rank-current .ri-sub { font-size: 12px; color: var(--muted); margin-top: 4px; }
    .rank-bar {
      margin-top: 10px;
      height: 8px; background: color-mix(in srgb, var(--muted) 20%, transparent);
      border-radius: 99px; overflow: hidden;
    }
    .rank-bar-fill {
      height: 100%;
      background: var(--rank-fill, var(--blue));
      border-radius: 99px;
      transition: width .6s cubic-bezier(.34,1.56,.64,1);
    }
    .rank-max { font-size: 13px; font-weight: 700; color: var(--rank-name, var(--text)); margin-top: 8px; }

    /* ── Rank Grid ── */
    .rank-grid {
      display: grid; grid-template-columns: repeat(5,1fr); gap: 8px;
    }
    .rank-card {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 14px 10px;
      text-align: center;
      position: relative;
      transition: transform .2s cubic-bezier(.34,1.56,.64,1);
    }
    .rank-card:hover { transform: translateY(-3px); }
    .rank-card .ic { font-size: 28px; line-height: 1; }
    .rank-card .nm { font-size: 12px; font-weight: 700; margin-top: 6px; color: var(--text); }
    .rank-card .rg { font-size: 10px; color: var(--muted); margin-top: 2px; }
    .rank-card.active {
      border-width: 2px;
      background: var(--rank-bg, var(--surface));
      border-color: var(--rank-border, var(--text));
    }
    .rank-card .badge {
      position: absolute; top: -8px; right: 50%; transform: translateX(50%);
      background: var(--rank-border, var(--text)); color: #fff;
      font-size: 9px; font-weight: 700;
      padding: 2px 8px; border-radius: 99px;
      white-space: nowrap;
    }

    /* Rank theme variables applied to rank-card / rank-current */
    .rk-bronze   { --rank-border: var(--bronze-dark);   --rank-bg: var(--bronze-light);   --rank-name: var(--bronze-dark);   --rank-fill: var(--bronze-dark);   --rank-icon-bg: var(--bronze-light); }
    .rk-silver   { --rank-border: var(--silver-dark);   --rank-bg: var(--silver-light);   --rank-name: var(--silver-dark);   --rank-fill: var(--silver-dark);   --rank-icon-bg: var(--silver-light); }
    .rk-gold     { --rank-border: var(--gold-accent);   --rank-bg: var(--gold-light);     --rank-name: var(--gold-dark);     --rank-fill: var(--gold-accent);   --rank-icon-bg: var(--gold-light); }
    .rk-platinum { --rank-border: var(--platinum-dark); --rank-bg: var(--platinum-light); --rank-name: var(--platinum-dark); --rank-fill: var(--platinum-dark); --rank-icon-bg: var(--platinum-light); }
    .rk-legend   { --rank-border: var(--legend-dark);   --rank-bg: var(--legend-light);   --rank-name: var(--legend-dark);   --rank-fill: var(--legend-dark);   --rank-icon-bg: var(--legend-light); }

    /* ── Shame Wall ── */
    .shame {
      background: var(--surface);
      border: 2px solid var(--red);
      border-radius: var(--radius);
      padding: 32px 20px; text-align: center;
      animation: shameShake .5s ease;
    }
    .shame-n {
      font-size: clamp(72px, 20vw, 120px);
      font-family: 'Poppins', sans-serif;
      font-weight: 900; color: var(--red);
      line-height: 1; letter-spacing: -.04em;
    }
    .shame-unit { font-size: 18px; font-weight: 700; color: var(--red); }
    .shame-txt  { font-size: 13px; color: var(--muted); margin-top: 12px; }

    /* ── Drop Zone ── */
    .dz {
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      padding: 44px 20px; text-align: center;
      cursor: pointer;
      transition: border-color .15s, background .15s, transform .2s cubic-bezier(.34,1.56,.64,1);
      user-select: none;
    }
    .dz:hover      { border-color: var(--blue); transform: translateY(-2px); }
    .dz.over       { border-color: var(--blue); background: color-mix(in srgb, var(--blue) 5%, transparent); transform: scale(1.01); }
    .dz.done       { border-style: solid; border-color: var(--green); }
    .dz img        { max-width: 200px; max-height: 200px; object-fit: contain; display: block; margin: 0 auto 14px; border-radius: 10px; }
    .dz .hint      { font-size: 13px; color: var(--muted); line-height: 1.8; }
    .dz .hint-icon { font-size: 32px; margin-bottom: 8px; }
    .dz .ok-lbl    { font-size: 14px; font-weight: 700; color: var(--green); margin-top: 8px; }
    .dz .praise-txt {
      font-size: 14px; font-weight: 600; color: var(--text);
      margin-top: 12px; line-height: 1.7;
      padding: 10px 16px;
      background: color-mix(in srgb, var(--green) 10%, transparent);
      border-radius: 10px;
      animation: praiseIn .5s cubic-bezier(.34,1.56,.64,1) .1s both;
    }
    .dz .re-lbl    { font-size: 11px; color: var(--muted); margin-top: 10px; }
    #fi { display: none; }

    /* ── Heatmap (15 × 2) ── */
    .cal { display: grid; grid-template-columns: repeat(15,1fr); gap: 4px; }
    .cc {
      aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 600; color: #fff;
      border-radius: 6px;
      transition: transform .15s cubic-bezier(.34,1.56,.64,1);
    }
    .cc.pre  { background: color-mix(in srgb, var(--muted) 20%, transparent); color: var(--muted); }
    .cc.hit  { background: var(--hg); }
    .cc.miss { background: var(--hr); opacity: .85; }
    .cc.now  { background: color-mix(in srgb, var(--muted) 20%, transparent); color: var(--text); border: 2px solid var(--muted); }
    .cc.hit:hover, .cc.miss:hover, .cc.now:hover { transform: scale(1.18); z-index: 1; }

    /* ── Gallery ── */
    .gallery { display: grid; grid-template-columns: repeat(4,1fr); gap: 8px; }
    .gi {
      aspect-ratio: 1; position: relative; overflow: hidden;
      background: var(--surface); border: 1.5px solid var(--border);
      border-radius: 14px;
      cursor: zoom-in;
      transition: transform .2s cubic-bezier(.34,1.56,.64,1), border-color .2s;
      animation: giIn .35s cubic-bezier(.34,1.56,.64,1) both;
    }
    .gi:hover { transform: scale(1.05) rotate(.5deg); border-color: var(--blue); }
    .gi img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform .3s; }
    .gd {
      position: absolute; bottom: 0; left: 0; right: 0;
      background: rgba(0,0,0,.55); color: #fff;
      font-size: 9px; padding: 3px 5px; text-align: center;
      border-radius: 0 0 12px 12px;
    }
    .g-badge {
      position: absolute; top: 5px; right: 5px;
      background: var(--blue); color: #fff;
      font-size: 9px; font-weight: 700;
      padding: 2px 6px; border-radius: 99px;
    }
    .empty { font-size: 13px; color: var(--muted); }

    /* ── Buttons ── */
    .btn {
      display: inline-block;
      padding: 10px 20px;
      font: 13px/1 system-ui, sans-serif;
      font-weight: 600;
      border: 1.5px solid var(--border);
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
      border-radius: 10px;
      transition: border-color .15s, background .15s, color .15s, transform .15s cubic-bezier(.34,1.56,.64,1);
    }
    .btn:hover         { border-color: var(--muted); transform: translateY(-2px); }
    .btn:active        { transform: scale(.95); }
    .btn.primary       { border-color: var(--blue); color: var(--blue); }
    .btn.primary:hover { background: var(--blue); color: #fff; }
    .btn.danger        { border-color: var(--red); color: var(--red); }
    .btn.danger:hover  { background: var(--red); color: #fff; }
    .btn-row { display: flex; gap: 8px; flex-wrap: wrap; }

    /* ── Modal (preview & rank-up) ── */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.75);
      display: flex; align-items: center; justify-content: center;
      z-index: 1000;
      padding: 20px;
      animation: fadeIn .2s ease;
    }
    .modal-overlay.hidden { display: none; }
    .modal-close {
      position: absolute; top: 16px; right: 16px;
      width: 40px; height: 40px;
      border: none; background: rgba(255,255,255,.12);
      color: #fff; font-size: 20px; font-weight: 600;
      border-radius: 50%; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background .15s, transform .15s;
      z-index: 2;
    }
    .modal-close:hover { background: rgba(255,255,255,.25); transform: rotate(90deg); }

    /* Preview modal */
    .preview-wrap {
      max-width: 90vw; max-height: 90vh;
      display: flex; flex-direction: column; align-items: center; gap: 12px;
      animation: previewIn .3s cubic-bezier(.34,1.56,.64,1);
    }
    .preview-imgs {
      display: flex; flex-direction: column; gap: 12px;
      overflow-y: auto; max-height: 80vh;
    }
    .preview-imgs img {
      max-width: 90vw; max-height: 75vh;
      object-fit: contain; border-radius: 12px;
      display: block;
    }
    .preview-date { color: #fff; font-size: 14px; font-weight: 600; }

    /* Rank-up modal */
    #rankup-overlay { position: fixed; inset: 0; z-index: 1100; display: none; }
    #rankup-overlay.active { display: block; }
    #confetti-canvas {
      position: fixed; inset: 0; width: 100%; height: 100%;
      pointer-events: none; z-index: 1101;
    }
    #rankup-bg {
      position: absolute; inset: 0;
      background: rgba(0,0,0,.6);
      animation: fadeIn .25s ease;
    }
    .rankup-card {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      background: var(--surface);
      border: 2px solid var(--rank-border, var(--text));
      border-radius: 24px;
      padding: 36px 40px 32px;
      text-align: center;
      min-width: 320px; max-width: 90vw;
      z-index: 1102;
      animation: rankupIn .5s cubic-bezier(.34,1.56,.64,1);
    }
    .rankup-card .ic {
      font-size: 88px; line-height: 1;
      margin-bottom: 16px;
      display: inline-block;
      animation: rankIconBounce 1s ease infinite;
    }
    .rankup-card .lbl-up {
      font-family: 'Poppins', sans-serif; font-weight: 900;
      font-size: 14px; letter-spacing: .15em;
      color: var(--rank-name, var(--text));
      text-transform: uppercase;
    }
    .rankup-card .nm {
      font-size: 32px; font-weight: 900;
      color: var(--rank-name, var(--text));
      margin-top: 4px; letter-spacing: -.02em;
    }
    .rankup-card .msg {
      font-size: 14px; line-height: 1.8;
      color: var(--text); margin-top: 16px;
      white-space: pre-line;
    }
    .rankup-card .close-btn {
      margin-top: 24px;
      padding: 12px 32px;
      background: var(--rank-name, var(--text));
      color: #fff; border: none;
      border-radius: 10px;
      font-size: 13px; font-weight: 700; cursor: pointer;
      transition: transform .15s;
    }
    .rankup-card .close-btn:hover { transform: translateY(-2px); }
    .rankup-card .close-btn:active { transform: scale(.96); }

    /* ── Animations ── */
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes previewIn {
      from { opacity: 0; transform: scale(.92); }
      to   { opacity: 1; transform: scale(1); }
    }
    @keyframes rankupIn {
      0%   { opacity: 0; transform: translate(-50%, -50%) scale(.7); }
      100% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
    }
    @keyframes rankIconBounce {
      0%,100% { transform: translateY(0); }
      50%     { transform: translateY(-8px); }
    }
    @keyframes praiseIn {
      from { opacity: 0; transform: translateY(12px) scale(.95); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    @keyframes dzPop {
      0%   { transform: scale(1); }
      30%  { transform: scale(1.04); }
      60%  { transform: scale(.97); }
      80%  { transform: scale(1.01); }
      100% { transform: scale(1); }
    }
    @keyframes statPulse {
      0%   { transform: scale(1); }
      45%  { transform: scale(1.08) translateY(-3px); }
      100% { transform: scale(1); }
    }
    @keyframes shameShake {
      0%,100% { transform: translateX(0); }
      20%     { transform: translateX(-6px); }
      40%     { transform: translateX(6px); }
      60%     { transform: translateX(-4px); }
      80%     { transform: translateX(4px); }
    }
    @keyframes giIn {
      from { opacity: 0; transform: scale(.8) rotate(-3deg); }
      to   { opacity: 1; transform: scale(1) rotate(0deg); }
    }
    @keyframes floatUp {
      0%   { opacity: 1; transform: translate(var(--tx,0px), 0px) scale(1) rotate(0deg); }
      100% { opacity: 0; transform: translate(var(--tx,0px), var(--ty,-200px)) scale(.4) rotate(var(--rot,360deg)); }
    }
    .confetti-e {
      position: fixed; pointer-events: none; z-index: 9999;
      animation: floatUp var(--dur,1s) ease-out var(--delay,0s) both;
    }

    @media (max-width: 520px) {
      .gallery   { grid-template-columns: repeat(3,1fr); }
      .stat-v    { font-size: 22px; }
      .cal       { grid-template-columns: repeat(10,1fr); }
      .rank-grid { grid-template-columns: repeat(5,1fr); gap: 4px; }
      .rank-card .nm { font-size: 10px; }
      .rank-card .rg { font-size: 9px; }
    }
  </style>
</head>
<body>

<div class="wrap">

  <div class="hd">
    <h1>📅&nbsp;&nbsp;ポートフォリオ提出管理</h1>
    <p id="hd-date"></p>
  </div>

  <div class="rules">
    <p><strong>提出ノルマ：</strong>毎日1枚以上、ポートフォリオ用の画像を提出してください。</p>
    <p><strong>ペナルティ：</strong>提出をサボると、「煽りメッセージ」が届きます😱</p>
    <p><strong>エスカレート方式：</strong>煽りのキツさは全9段階です。未提出の日数が長引くほど、メッセージが容赦なくヒートアップしていきます🔥</p>
  </div>

  <!-- ── Setup view ── -->
  <div id="v-setup" style="display:none">
    <div class="setup-card">
      <p>開始日を登録して毎日の提出を記録しましょう。</p>
      <button class="btn primary" id="btn-start">今日から開始する 🚀</button>
    </div>
  </div>

  <!-- ── App view ── -->
  <div id="v-app" style="display:none">

    <div class="sec">
      <div class="lbl">サマリー</div>
      <div class="stats">
        <div class="stat" id="stat-today-card">
          <div class="stat-v" id="s-today">—</div>
          <div class="stat-k">今日</div>
        </div>
        <div class="stat" id="stat-streak-card">
          <div class="stat-v ok" id="s-streak">0</div>
          <div class="stat-k">連続達成日数</div>
        </div>
        <div class="stat" id="stat-total-card">
          <div class="stat-v" id="s-total">0</div>
          <div class="stat-k">総提出枚数</div>
        </div>
      </div>
    </div>

    <div class="sec">
      <div class="lbl">現在のランク</div>
      <div class="rank-current" id="rank-current">
        <div class="ri" id="rc-icon">🌱</div>
        <div class="ri-info">
          <div class="ri-name" id="rc-name">まだランクなし</div>
          <div class="ri-sub" id="rc-sub">0枚提出済み</div>
          <div class="rank-bar"><div class="rank-bar-fill" id="rc-bar" style="width:0%"></div></div>
        </div>
      </div>
    </div>

    <div class="sec">
      <div class="lbl">ランク一覧</div>
      <div class="rank-grid" id="rank-grid"></div>
    </div>

    <div class="sec" id="shame-sec" style="display:none">
      <div class="lbl">⚠ 連続未達成</div>
      <div class="shame" id="shame-box">
        <div class="shame-n" id="shame-n">0</div>
        <div class="shame-unit" id="shame-unit">日連続でサボってます</div>
        <div class="shame-txt" id="shame-txt"></div>
      </div>
    </div>

    <div class="sec">
      <div class="lbl">今日の提出</div>
      <div class="dz" id="dz"><div id="dz-in"></div></div>
      <input type="file" id="fi" accept="image/*">
    </div>

    <div class="sec">
      <div class="lbl">直近30日</div>
      <div class="cal" id="cal"></div>
    </div>

    <div class="sec">
      <div class="lbl">ギャラリー（最新12日）</div>
      <div id="gallery"></div>
    </div>

    <div class="sec">
      <div class="lbl">設定</div>
      <p style="font-size:12px;color:var(--muted);margin-bottom:12px">
        開始日: <span id="start-txt"></span>
      </p>
      <div class="btn-row">
        <button class="btn" id="btn-reset-start">開始日をリセット</button>
        <button class="btn danger" id="btn-reset-all">全データをリセット</button>
      </div>
    </div>

  </div><!-- /v-app -->
</div><!-- /wrap -->

<!-- Preview Modal -->
<div class="modal-overlay hidden" id="preview-overlay">
  <button class="modal-close" id="preview-close" aria-label="閉じる">✕</button>
  <div class="preview-wrap">
    <div class="preview-date" id="preview-date"></div>
    <div class="preview-imgs" id="preview-imgs"></div>
  </div>
</div>

<!-- Rank-up Modal -->
<div id="rankup-overlay">
  <canvas id="confetti-canvas"></canvas>
  <div id="rankup-bg"></div>
  <div class="rankup-card" id="rankup-card">
    <div class="ic" id="ru-icon">🥉</div>
    <div class="lbl-up">Rank Up !</div>
    <div class="nm" id="ru-name">ブロンズ</div>
    <div class="msg" id="ru-msg"></div>
    <button class="close-btn" id="ru-close">閉じる</button>
  </div>
</div>

<script>
'use strict';

/* ── Storage ── */
const KEY = 'pf-tracker-v1';
let db = { startDate: null, subs: {}, lastSeenRank: null };

function load() {
  try {
    const r = localStorage.getItem(KEY);
    if (r) db = Object.assign({ startDate: null, subs: {}, lastSeenRank: null }, JSON.parse(r));
    // Migrate old single-image format
    for (const date of Object.keys(db.subs)) {
      const sub = db.subs[date];
      if (sub && sub.img !== undefined) {
        db.subs[date] = { imgs: [{ img: sub.img, at: sub.at }], praise: sub.praise };
      }
    }
  } catch(_) {}
}
function persist() {
  try { localStorage.setItem(KEY, JSON.stringify(db)); }
  catch(_) { alert('保存失敗: ストレージ容量が不足しています。古い画像の削除をお試しください。'); }
}

/* ── Date helpers ── */
function pad(n) { return String(n).padStart(2,'0'); }
function today() {
  const d = new Date();
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
}
function dstr(d) {
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
}

/* ── Stats ── */
function streak() {
  if (!db.startDate) return 0;
  let n = 0, d = new Date();
  while (true) {
    const s = dstr(d);
    if (s < db.startDate) break;
    if (db.subs[s]) { n++; d.setDate(d.getDate() - 1); }
    else break;
  }
  return n;
}

function shame() {
  const t = today();
  if (!db.startDate || db.subs[t]) return 0;
  let n = 0, d = new Date();
  while (true) {
    const s = dstr(d);
    if (s < db.startDate) break;
    if (!db.subs[s]) { n++; d.setDate(d.getDate() - 1); }
    else break;
  }
  return n;
}

function totalImages() {
  return Object.values(db.subs).reduce((acc, sub) => acc + (sub.imgs?.length || 0), 0);
}

/* ── Shame messages (9 levels) ── */
const SHAME_MESSAGES = [
  'ポートフォリオは勝手に増えませんよ',
  '明日やる人は永遠にやらない',
  '言い訳のストックは溜まる一方ですね',
  '1日1枚を破る人が、1日10枚描けるはずもなく',
  '今日の自分が、来週の自分を殺してます',
  '面倒くさいは、未来の機会損失と等価です',
  'サボった日数 = 失った案件数かもしれません',
  'クライアントは待ってくれませんよ',
  'このカウンターが0になる日は来るんでしょうか',
];
function shameMessage(days) {
  // 1日→[0], 9日以上→[8]
  const idx = Math.min(Math.max(days - 1, 0), SHAME_MESSAGES.length - 1);
  return SHAME_MESSAGES[idx];
}

/* ── Praise messages ── */
const PRAISES = [
  '天才か？よく頑張ったな。自分へのご褒美にお菓子でも買いな。',
  'マジで偉すぎる。今日のあなたは最高にかっこいい。',
  'これは神の所業。ノーベルポートフォリオ賞あげたい。',
  'やばい、感動した。続けてるあなたが一番強い。',
  '今日も提出できたじゃん。普通に尊敬してる。',
  '素晴らしすぎて言葉が出ない。とにかくえらい。',
  'こんなに頑張れるの、あなたしかいないよ。本当に。',
  '毎日これができる人間、そうそういないよ。本物だ。',
  '今すぐ自分を褒めて。それだけの価値がある。',
];
const MULTI_PRAISES = [
  '1日でこんなにできるのかよ...凄すぎじゃん。',
  '複数枚ってどんだけ意欲があるんだ。もはや怪物。',
  '量産型天才じゃん。今日は何食べたの？',
  'え、まだ出すの？もう十分すぎるくらい偉いよ。',
  'これだけ出せるなら、明日も来いよ。絶対来いよ。',
  '何枚出す気？あなたのこと、ちょっと怖くなってきた（褒めてる）。',
  '人間の限界に挑戦してる？今日は本当にすごい。',
];

/* ── Rank system ── */
const RANKS = [
  { key: 'bronze',   name: 'ブロンズ',   min: 1,  max: 4,        icon: '🥉', cls: 'rk-bronze',
    msg: 'おめでとう、最初の1枚！\nここから全てが始まる。' },
  { key: 'silver',   name: 'シルバー',   min: 5,  max: 9,        icon: '🥈', cls: 'rk-silver',
    msg: '5枚突破！もう「やる気がある人」じゃなくて「やってる人」だ。' },
  { key: 'gold',     name: 'ゴールド',   min: 10, max: 14,       icon: '🏆', cls: 'rk-gold',
    msg: 'おめでとう！継続できる君は天才だ。\n二桁の壁を超えた。' },
  { key: 'platinum', name: 'プラチナ',   min: 15, max: 19,       icon: '👑', cls: 'rk-platinum',
    msg: '15枚。これはもう、立派なポートフォリオだ。\n胸を張ってラフを送りつけよう。' },
  { key: 'legend',   name: 'レジェンド', min: 20, max: Infinity, icon: '⭐', cls: 'rk-legend',
    msg: '20枚以上。君はもう、面倒くさいの向こう側にいる。\n伝説、始まりました。' },
];

const RANKUP_TITLE = {
  bronze:   'ブロンズ獲得！',
  silver:   'シルバーに昇格！',
  gold:     'ゴールドに到達！',
  platinum: 'プラチナ獲得！',
  legend:   'レジェンド到達！',
};

function getRank(count) {
  for (const r of RANKS) if (count >= r.min && count <= r.max) return r;
  return null;
}
function rankIndex(key) {
  if (!key) return -1;
  return RANKS.findIndex(r => r.key === key);
}

/* ── Render: Rank ── */
function renderRank() {
  const count = totalImages();
  const rank  = getRank(count);
  const rc    = document.getElementById('rank-current');
  const icon  = document.getElementById('rc-icon');
  const name  = document.getElementById('rc-name');
  const sub   = document.getElementById('rc-sub');
  const bar   = document.getElementById('rc-bar');

  // Clear theme classes
  rc.classList.remove('has-rank', 'rk-bronze','rk-silver','rk-gold','rk-platinum','rk-legend');

  if (!rank) {
    icon.textContent = '🌱';
    name.textContent = 'まだランクなし';
    sub.textContent  = `0枚提出済み · ブロンズまであと1枚`;
    bar.style.width  = '0%';
    bar.parentElement.style.display = '';
  } else {
    rc.classList.add('has-rank', rank.cls);
    icon.textContent = rank.icon;
    name.textContent = rank.name;
    if (rank.key === 'legend') {
      sub.textContent = `${count}枚提出済み · 最高ランク到達 🎉`;
      bar.parentElement.style.display = 'none';
    } else {
      const next = RANKS[RANKS.findIndex(r => r.key === rank.key) + 1];
      const remain = next.min - count;
      sub.textContent = `${count}枚提出済み · ${next.name}まであと${remain}枚`;
      const pct = ((count - rank.min) / (next.min - rank.min)) * 100;
      bar.parentElement.style.display = '';
      bar.style.width = `${Math.min(100, Math.max(0, pct))}%`;
    }
  }

  // Rank grid
  const grid = document.getElementById('rank-grid');
  grid.innerHTML = '';
  for (const r of RANKS) {
    const isCurrent = rank && rank.key === r.key;
    const card = document.createElement('div');
    card.className = `rank-card ${r.cls}${isCurrent ? ' active' : ''}`;
    const range = r.max === Infinity ? `${r.min}枚〜` : `${r.min}〜${r.max}枚`;
    card.innerHTML =
      (isCurrent ? `<div class="badge">現在</div>` : '') +
      `<div class="ic">${r.icon}</div>` +
      `<div class="nm">${r.name}</div>` +
      `<div class="rg">${range}</div>`;
    grid.appendChild(card);
  }
}

/* ── Celebration (emoji burst) ── */
const PARTY = ['🎉','✨','🌟','💫','🎊','🥳','💪','🏆','⭐','🎈','🦄','🔥','🍭','🎀','💎'];
function celebrate() {
  const dz   = document.getElementById('dz');
  const rect = dz.getBoundingClientRect();
  const cx   = rect.left + rect.width  / 2;
  const cy   = rect.top  + rect.height / 2;

  dz.style.animation = 'none';
  void dz.offsetHeight;
  dz.style.animation = 'dzPop .5s cubic-bezier(.34,1.56,.64,1)';

  for (let i = 0; i < 22; i++) {
    const el = document.createElement('div');
    el.className   = 'confetti-e';
    el.textContent = PARTY[Math.floor(Math.random() * PARTY.length)];
    const angle = (i / 22) * Math.PI * 2 + (Math.random() - .5) * .8;
    const dist  = 80 + Math.random() * 180;
    const tx    = Math.cos(angle) * dist;
    const ty    = -(Math.abs(Math.sin(angle)) * dist + 60 + Math.random() * 100);
    const rot   = (Math.random() - .5) * 900;
    const size  = 20 + Math.random() * 22;
    const dur   = .7 + Math.random() * .6;
    el.style.cssText =
      `left:${cx}px; top:${cy}px; font-size:${size}px;` +
      `--tx:${tx}px; --ty:${ty}px; --rot:${rot}deg;` +
      `--dur:${dur}s; --delay:${i * 30}ms;`;
    document.body.appendChild(el);
    el.addEventListener('animationend', () => el.remove());
  }

  ['stat-today-card','stat-streak-card','stat-total-card'].forEach((id, i) => {
    const el = document.getElementById(id);
    setTimeout(() => {
      el.style.animation = 'none';
      void el.offsetHeight;
      el.style.animation = 'statPulse .4s cubic-bezier(.34,1.56,.64,1)';
    }, 200 + i * 80);
  });
}

/* ── Canvas Confetti for rank-up ── */
let confettiRAF = null;
function fireConfetti() {
  const canvas = document.getElementById('confetti-canvas');
  const ctx    = canvas.getContext('2d');
  const W = canvas.width  = window.innerWidth;
  const H = canvas.height = window.innerHeight;
  const colors = ['#EF9F27', '#3C3489', '#72243E', '#1D9E75', '#E24B4A', '#60a5fa', '#FAC775'];
  const particles = [];
  for (let i = 0; i < 180; i++) {
    particles.push({
      x: Math.random() * W,
      y: -20 - Math.random() * H * 0.4,
      w: 6 + Math.random() * 8,
      h: 10 + Math.random() * 14,
      vy: 2.5 + Math.random() * 4,
      vx: (Math.random() - .5) * 3,
      rot: Math.random() * Math.PI * 2,
      vr: (Math.random() - .5) * 0.25,
      color: colors[Math.floor(Math.random() * colors.length)],
    });
  }
  const start = performance.now();
  if (confettiRAF) cancelAnimationFrame(confettiRAF);
  function tick(t) {
    const elapsed = t - start;
    const alpha   = elapsed > 3000 ? Math.max(0, 1 - (elapsed - 3000) / 1500) : 1;
    ctx.clearRect(0, 0, W, H);
    ctx.globalAlpha = alpha;
    for (const p of particles) {
      p.x += p.vx;
      p.y += p.vy;
      p.rot += p.vr;
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
      ctx.restore();
    }
    if (elapsed < 4500) {
      confettiRAF = requestAnimationFrame(tick);
    } else {
      ctx.clearRect(0, 0, W, H);
      confettiRAF = null;
    }
  }
  confettiRAF = requestAnimationFrame(tick);
}

/* ── Rank-up modal ── */
function showRankUp(rank) {
  const overlay = document.getElementById('rankup-overlay');
  const card    = document.getElementById('rankup-card');
  // Apply theme to card
  card.classList.remove('rk-bronze','rk-silver','rk-gold','rk-platinum','rk-legend');
  card.classList.add(rank.cls);
  document.getElementById('ru-icon').textContent = rank.icon;
  document.getElementById('ru-name').textContent = RANKUP_TITLE[rank.key];
  document.getElementById('ru-msg').textContent  = rank.msg;

  overlay.classList.add('active');
  // re-trigger card entrance animation
  card.style.animation = 'none'; void card.offsetHeight;
  card.style.animation = 'rankupIn .5s cubic-bezier(.34,1.56,.64,1)';

  fireConfetti();
}
function closeRankUp() {
  document.getElementById('rankup-overlay').classList.remove('active');
  const canvas = document.getElementById('confetti-canvas');
  canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);
  if (confettiRAF) { cancelAnimationFrame(confettiRAF); confettiRAF = null; }
  // Update lastSeenRank
  const cur = getRank(totalImages());
  db.lastSeenRank = cur ? cur.key : null;
  persist();
}

/* ── Preview modal ── */
function openPreview(date) {
  const sub = db.subs[date];
  if (!sub) return;
  const imgs = sub.imgs || [];
  const overlay = document.getElementById('preview-overlay');
  const wrap    = document.getElementById('preview-imgs');
  const dateEl  = document.getElementById('preview-date');
  dateEl.textContent = `${date}（${imgs.length}枚）`;
  wrap.innerHTML = imgs.map(o => `<img src="${o.img}" alt="${date}">`).join('');
  overlay.classList.remove('hidden');
}
function closePreview() {
  document.getElementById('preview-overlay').classList.add('hidden');
}

/* ── Render ── */
function render() {
  const t     = today();
  const done  = !!db.subs[t];
  const str   = streak();
  const shm   = shame();
  const total = totalImages();

  // Summary
  const sv = document.getElementById('s-today');
  sv.textContent = done ? '✓ 達成' : '未提出';
  sv.style.fontSize = done ? '20px' : '20px';
  sv.className = 'stat-v ' + (done ? 'ok' : 'ng');
  document.getElementById('s-streak').textContent = str;
  document.getElementById('s-total').textContent  = total;

  // Rank
  renderRank();

  // Shame
  const ss = document.getElementById('shame-sec');
  if (shm > 0) {
    ss.style.display = '';
    document.getElementById('shame-n').textContent   = shm;
    document.getElementById('shame-unit').textContent = `${shm}日連続でサボってます`;
    document.getElementById('shame-txt').textContent = shameMessage(shm);
    const box = document.getElementById('shame-box');
    box.style.animation = 'none'; void box.offsetHeight;
    box.style.animation = 'shameShake .5s ease';
  } else {
    ss.style.display = 'none';
  }

  // Drop zone
  const dz   = document.getElementById('dz');
  const dzIn = document.getElementById('dz-in');
  if (done) {
    dz.className = 'dz done';
    const sub    = db.subs[t];
    const imgs   = sub.imgs || [];
    const count  = imgs.length;
    const latest = imgs[imgs.length - 1]?.img || '';
    dzIn.innerHTML =
      `<img src="${latest}" alt="提出済み">` +
      `<div class="ok-lbl">✓ ${count}枚 提出済み</div>` +
      (sub.praise ? `<div class="praise-txt">${sub.praise}</div>` : '') +
      `<div class="re-lbl">クリックでさらに追加</div>`;
  } else {
    dz.className = 'dz';
    dzIn.innerHTML =
      `<div class="hint-icon">🖼️</div>` +
      `<div class="hint">クリック または ドラッグ&ドロップ<br>Ctrl+V 貼り付けも可</div>`;
  }

  renderCal();
  renderGallery();

  const st = document.getElementById('start-txt');
  if (st) st.textContent = db.startDate || '—';
}

function renderCal() {
  const cal = document.getElementById('cal');
  cal.innerHTML = '';
  const t = today();

  // Last 30 days, oldest first
  for (let i = 0; i < 30; i++) {
    const d = new Date();
    d.setDate(d.getDate() - 29 + i);
    const s   = dstr(d);
    const num = d.getDate();

    const el = document.createElement('div');
    el.className = 'cc';
    el.textContent = num;
    el.title = s;

    if (!db.startDate || s < db.startDate) {
      el.classList.add('pre');
    } else if (db.subs[s]) {
      el.classList.add('hit');
    } else if (s === t) {
      el.classList.add('now');
    } else {
      el.classList.add('miss');
    }
    cal.appendChild(el);
  }
}

function renderGallery() {
  const g     = document.getElementById('gallery');
  const dates = Object.keys(db.subs).sort().reverse().slice(0, 12);

  if (!dates.length) {
    g.className = '';
    g.innerHTML = '<p class="empty">まだ提出がありません。</p>';
    return;
  }
  g.className = 'gallery';
  g.innerHTML = '';
  dates.forEach((date, idx) => {
    const sub    = db.subs[date];
    const imgs   = sub.imgs || [];
    const count  = imgs.length;
    const latest = imgs[imgs.length - 1]?.img || '';

    const item = document.createElement('div');
    item.className = 'gi';
    item.style.animationDelay = `${idx * 40}ms`;
    item.innerHTML =
      `<img src="${latest}" alt="${date}">` +
      `<div class="gd">${date.slice(5)}</div>` +
      (count > 1 ? `<div class="g-badge">${count}枚</div>` : '');
    item.addEventListener('click', () => openPreview(date));
    g.appendChild(item);
  });
}

/* ── Image processing ── */
async function compress(file) {
  return new Promise((res, rej) => {
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        const MAX = 400;
        let w = img.width, h = img.height;
        if (w >= h) { if (w > MAX) { h = Math.round(h * MAX / w); w = MAX; } }
        else        { if (h > MAX) { w = Math.round(w * MAX / h); h = MAX; } }
        const c = document.createElement('canvas');
        c.width = w; c.height = h;
        c.getContext('2d').drawImage(img, 0, 0, w, h);
        res(c.toDataURL('image/jpeg', 0.7));
      };
      img.onerror = rej;
      img.src = e.target.result;
    };
    reader.onerror = rej;
    reader.readAsDataURL(file);
  });
}

async function submit(file) {
  if (!file || !file.type.startsWith('image/')) return;
  try {
    const img = await compress(file);
    const t   = today();
    const existing = db.subs[t];
    let imgs, praise;

    if (existing && existing.imgs?.length > 0) {
      imgs   = [...existing.imgs, { img, at: Date.now() }];
      praise = MULTI_PRAISES[Math.floor(Math.random() * MULTI_PRAISES.length)];
    } else {
      imgs   = [{ img, at: Date.now() }];
      praise = PRAISES[Math.floor(Math.random() * PRAISES.length)];
    }
    db.subs[t] = { imgs, praise };

    // Check rank-up BEFORE persisting
    const newCount = totalImages();
    const newRank  = getRank(newCount);
    const newRankKey = newRank ? newRank.key : null;
    const seenIdx = rankIndex(db.lastSeenRank);
    const newIdx  = rankIndex(newRankKey);
    const rankUp  = newRank && newIdx > seenIdx;

    persist();
    render();
    celebrate();

    if (rankUp) {
      setTimeout(() => showRankUp(newRank), 700);
    }
  } catch(_) {
    alert('画像の処理に失敗しました。');
  }
}

/* ── UI wiring ── */
function initUI() {
  const dz = document.getElementById('dz');
  const fi = document.getElementById('fi');

  dz.addEventListener('click',     () => fi.click());
  fi.addEventListener('change',    e  => { if (e.target.files[0]) submit(e.target.files[0]); fi.value = ''; });
  dz.addEventListener('dragover',  e  => { e.preventDefault(); dz.classList.add('over'); });
  dz.addEventListener('dragleave', ()  => dz.classList.remove('over'));
  dz.addEventListener('drop',      e  => {
    e.preventDefault(); dz.classList.remove('over');
    if (e.dataTransfer.files[0]) submit(e.dataTransfer.files[0]);
  });
  document.addEventListener('paste', e => {
    const f = e.clipboardData?.files[0];
    if (f?.type.startsWith('image/')) submit(f);
  });

  document.getElementById('btn-start').addEventListener('click', () => {
    db.startDate = today();
    db.subs = {};
    db.lastSeenRank = null;
    persist();
    showApp();
  });

  document.getElementById('btn-reset-start').addEventListener('click', () => {
    if (!confirm('開始日を今日にリセットしますか？\n提出データは保持されます。')) return;
    db.startDate = today();
    persist();
    render();
  });

  document.getElementById('btn-reset-all').addEventListener('click', () => {
    if (!confirm('全データを削除しますか？\nこの操作は取り消せません。')) return;
    db = { startDate: null, subs: {}, lastSeenRank: null };
    persist();
    showSetup();
  });

  // Preview modal
  document.getElementById('preview-close').addEventListener('click', closePreview);
  document.getElementById('preview-overlay').addEventListener('click', e => {
    if (e.target.id === 'preview-overlay') closePreview();
  });

  // Rank-up modal
  document.getElementById('ru-close').addEventListener('click', closeRankUp);
  document.getElementById('rankup-bg').addEventListener('click', closeRankUp);

  // ESC closes any modal
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
      if (!document.getElementById('preview-overlay').classList.contains('hidden')) closePreview();
      if (document.getElementById('rankup-overlay').classList.contains('active'))   closeRankUp();
    }
  });

  // Resize confetti canvas
  window.addEventListener('resize', () => {
    const c = document.getElementById('confetti-canvas');
    c.width = window.innerWidth; c.height = window.innerHeight;
  });
}

function showApp() {
  document.getElementById('v-setup').style.display = 'none';
  document.getElementById('v-app').style.display   = '';
  render();
}
function showSetup() {
  document.getElementById('v-setup').style.display = '';
  document.getElementById('v-app').style.display   = 'none';
}

/* ── Boot ── */
(function() {
  const d   = new Date();
  const DOW = '日月火水木金土';
  document.getElementById('hd-date').textContent =
    `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日（${DOW[d.getDay()]}）`;
})();

load();
initUI();
if (db.startDate) showApp(); else showSetup();
</script>
</body>
</html>
